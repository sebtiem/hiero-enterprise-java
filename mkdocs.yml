# Technical documentation for Hiero Enterprise Java
# Rendered as GitHub Pages via .github/workflows/docs.yml

site_name: Hiero Enterprise Java — Technical Documentation
site_description: Technical documentation for Hiero Enterprise Java (Spring & MicroProfile integrations for Hiero)
site_url: https://hiero-ledger.github.io/hiero-enterprise-java/

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.svg
  palette:
    - scheme: default
      primary: hiero
      accent: hiero
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: hiero
      accent: hiero
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Spring Boot: spring-boot.md
  - MicroProfile: microprofile.md
  - Base / Managed services: managed-services.md
  - Contributing to the docs: contributing.md
